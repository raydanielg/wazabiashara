<!DOCTYPE html>
<html lang="sw">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline — Wazabiashara</title>
<meta name="theme-color" content="#024938">
<link rel="icon" type="image/png" href="/logo.png">
<link rel="manifest" href="/manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;background:linear-gradient(135deg,#024938,#013028);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:24px;padding:48px 32px;text-align:center;max-width:420px;width:100%;box-shadow:0 24px 60px -20px rgba(0,0,0,.3)}
.logo{width:72px;height:72px;border-radius:16px;margin:0 auto 24px;display:block}
h1{font-size:24px;font-weight:900;color:#024938;margin-bottom:12px}
p{font-size:15px;font-weight:600;color:#6b7280;line-height:1.6;margin-bottom:24px}
.icon{width:64px;height:64px;margin:0 auto 20px;border-radius:50%;background:#fef3c7;border:3px solid #f9ac00;display:flex;align-items:center;justify-content:center}
.icon svg{width:32px;height:32px}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(to right,#f9ac00,#d49700);color:#01241f;font-weight:900;font-size:14px;padding:12px 28px;border:none;border-radius:12px;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(249,172,0,.4)}
</style>
</head>
<body>
<div class="card">
  <img src="/logo.png" alt="Wazabiashara" class="logo">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="#d49700" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M16 18 22 12 16 6"/><path d="M8 6 2 12 8 18"/>
    </svg>
  </div>
  <h1>Hauna Intaneti Kwa Sasa</h1>
  <p>Ukiwa bila intaneti, unaweza bado kutumia Wazabiashara kwa mauzo yako. Intaneti ikirudi, kila kitu kitasawazishwa chenyewe.</p>
  <a href="/" class="btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 3l9 9"/><path d="M5 10v10h14V10"/></svg>
    Jaribu Tena
  </a>
</div>
</body>
</html>
