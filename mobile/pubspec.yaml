name: wazabiashara
description: "Wazabiashara — Your Business, In Your Hands. Manage sales, inventory, branches, debts and reports from your phone."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.0.5

  # Local Storage / Offline
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI / Icons
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.20.2
  flutter_secure_storage: ^9.2.2
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  local_auth: ^2.3.0
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#024938"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
  background_color_ios: "#024938"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/translations/
